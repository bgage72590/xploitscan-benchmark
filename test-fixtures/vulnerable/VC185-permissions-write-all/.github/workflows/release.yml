# Workflow grants every step write access to everything in the repo.
# Compromised action = full repo takeover. VC185 must fire.
name: Release

on:
  push:
    tags: ['v*']

permissions: write-all

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: npm publish
